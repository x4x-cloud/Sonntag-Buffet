<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Naya Jouly | نايا جولي</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root {
--gold:#C9A84C;
--gold-light:#F0D080;
--black:#0A0A0A;
--cream:#FDF6E3;
}

body{
background:var(--black);
color:var(--cream);
font-family:'Cairo',sans-serif;
margin:0;
}

/* LANG BUTTON */
.lang-toggle{
position:fixed;
top:20px;
left:20px;
z-index:999;
}
.lang-toggle button{
background:var(--gold);
border:none;
margin:2px;
padding:6px 12px;
cursor:pointer;
font-weight:bold;
}

/* HERO */
.hero{
text-align:center;
padding:80px 20px;
}

.logo{
width:150px;
height:150px;
border-radius:50%;
border:3px solid var(--gold);
box-shadow:0 10px 40px rgba(201,168,76,.4);
margin-bottom:20px;
}

.restaurant-name{
font-family:'Playfair Display';
font-size:28px;
color:var(--gold-light);
letter-spacing:3px;
margin-bottom:10px;
}

.hero-title{
font-size:50px;
margin:10px 0;
}

.buffet-time{
color:var(--gold-light);
margin-bottom:20px;
}

.map-btn{
display:inline-block;
margin-top:10px;
border:1px solid var(--gold);
padding:10px 20px;
color:var(--gold-light);
text-decoration:none;
}

/* CHEF */
.chef-section{
text-align:center;
padding:60px 20px;
}
.chef-img{
width:180px;
height:180px;
border-radius:50%;
border:3px solid var(--gold);
object-fit:cover;
}

/* FORM */
.booking{
max-width:500px;
margin:40px auto;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
background:#111;
border:1px solid var(--gold);
color:white;
}

button{
width:100%;
padding:15px;
background:var(--gold);
border:none;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LANG -->
<div class="lang-toggle">
<button onclick="setLang('ar')">AR</button>
<button onclick="setLang('de')">DE</button>
</div>

<!-- HERO -->
<section class="hero">

<img src="logo.png" class="logo">

<h2 class="restaurant-name" data-ar="نايا جولي" data-de="Naya Jouly">نايا جولي</h2>

<h1 class="hero-title" data-ar="بوفيه الأحد الملكي" data-de="Royaler Sonntagsbuffet">
بوفيه الأحد الملكي
</h1>

<p class="buffet-time"
data-ar="البوفيه يبدأ من الساعة 1:00 حتى 8:00 مساءً"
data-de="Buffet von 13:00 bis 20:00 Uhr">
</p>

<a href="https://maps.app.goo.gl/HFsHWcYLXKaFXkN88" target="_blank" class="map-btn">
📍 Google Maps
</a>

</section>

<!-- CHEF -->
<div class="chef-section">

<img src="chef.jpg" class="chef-img">

<h3 data-ar="الشيف عبود" data-de="Chef Abboud">الشيف عبود</h3>

<p
data-ar="الشيف عبود يحوّل كل وجبة إلى رحلة فاخرة في عالم النكهات العربية والشرقية. من الفتوش والتبولة إلى المشاوي والحلويات، كل طبق يحمل لمسته الخاصة واهتمامه بأدق التفاصيل."
data-de="Chef Abboud macht jedes Gericht zu einer unvergesslichen Reise durch die arabische und orientalische Küche.">
</p>

</div>

<!-- FORM -->
<div class="booking">

<input id="name" placeholder="الاسم / Name">

<select id="guests">
<option value="">عدد الأشخاص</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8+</option>
</select>

<select id="time">
<option value="">وقت الوصول</option>
<option>12:30</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
<option>17:00</option>
<option>18:00</option>
<option>19:00</option>
</select>

<button onclick="send()">احجز عبر واتساب</button>

</div>

<script>

function setLang(lang){
document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';

document.querySelectorAll('[data-ar]').forEach(el=>{
el.innerText = el.getAttribute('data-'+lang);
});
}

function send(){
let name=document.getElementById('name').value;
let guests=document.getElementById('guests').value;
let time=document.getElementById('time').value;

let msg=`حجز طاولة
الاسم: ${name}
عدد: ${guests}
وقت: ${time}`;

window.open(`https://wa.me/491234567890?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
